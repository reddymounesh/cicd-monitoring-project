apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cicdapp-alerts
  namespace: monitoring
  labels:
    # Must match Prometheus Operator's ruleSelector
    release: prometheus-stack
    role: alert-rules
spec:
  groups:
    - name: cicdapp.availability
      # How often to evaluate these rules
      interval: 30s
      rules:

        # ===== ALERT 1: Application Down =====
        - alert: ApplicationDown
          # expr: true when no instances of the app are reachable
          expr: up{job="spring-boot-app"} == 0
          # Wait 1 minute before firing (avoid false positives from brief restarts)
          for: 1m
          labels:
            severity: critical
            team: devops
          annotations:
            summary: "Application {{ $labels.instance }} is DOWN"
            description: >
              The application on {{ $labels.instance }} has been unreachable 
              for more than 1 minute. Prometheus cannot scrape metrics.
            runbook: "https://wiki.company.com/runbooks/app-down"

        # ===== ALERT 2: Pod CrashLoopBackOff =====
        - alert: PodCrashLooping
          expr: >
            rate(kube_pod_container_status_restarts_total{
              pod=~"cicdapp.*"
            }[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: >
              Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} 
              has restarted more than once in the last 15 minutes.

        # ===== ALERT 3: High Error Rate =====
        - alert: HighHttpErrorRate
          expr: >
            sum(rate(http_server_requests_seconds_count{
              application="cicd-monitoring-system",
              status=~"5.."
            }[5m])) /
            sum(rate(http_server_requests_seconds_count{
              application="cicd-monitoring-system"
            }[5m])) * 100 > 5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High HTTP error rate: {{ $value | humanize }}%"
            description: >
              HTTP 5xx error rate is {{ $value | humanize }}% 
              (threshold: 5%) for 2 minutes.

    - name: cicdapp.resources
      interval: 60s
      rules:

        # ===== ALERT 4: High CPU =====
        - alert: HighCpuUsage
          expr: >
            process_cpu_usage{application="cicd-monitoring-system"} * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage: {{ $value | humanize }}%"
            description: >
              CPU usage is {{ $value | humanize }}% (threshold: 80%) 
              on {{ $labels.instance }} for 5 minutes.

        # ===== ALERT 5: High Memory =====
        - alert: HighMemoryUsage
          expr: >
            jvm_memory_used_bytes{area="heap", application="cicd-monitoring-system"} /
            jvm_memory_max_bytes{area="heap", application="cicd-monitoring-system"} * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High JVM heap usage: {{ $value | humanize }}%"
            description: >
              JVM heap is {{ $value | humanize }}% full (threshold: 85%).
              Pod may be approaching OOMKill.

        # ===== ALERT 6: Deployment Unavailable =====
        - alert: DeploymentReplicasUnavailable
          expr: >
            kube_deployment_status_replicas_available{
              deployment="cicdapp-deployment"
            } < kube_deployment_spec_replicas{
              deployment="cicdapp-deployment"
            }
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Deployment has fewer replicas than desired"
            description: >
              Deployment cicdapp-deployment has 
              {{ $value }} available replicas but desires 
              {{ $labels.replicas }}.