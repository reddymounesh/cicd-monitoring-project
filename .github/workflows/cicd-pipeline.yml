name: CI/CD Pipeline


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-monitoring-app

  IMAGE_TAG: ${{ github.sha }}



jobs:

  build-and-test:
    name: Build and Test

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'

          distribution: 'temurin'

          cache: maven

      - name: Run tests with Maven
        run: mvn test -B

      - name: Build JAR
        run: mvn clean package -DskipTests -B


      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/cicdapp-1.0.0.jar
          retention-days: 1



  docker-build-push:
    name: Docker Build and push

    needs: build-and-test
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
            context: .
            push: true
            # Tag with both the commit SHA and 'latest'
            tags: |
              ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
              ${{ env.IMAGE_NAME }}:latest
            # Build cache — dramatically speeds up subsequent builds
            # Uses Docker Hub registry as cache storage
            cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
            cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

            # Output the exact image name for debugging and traceability
      - name: Image summary
        run: |
                echo "### Docker Image Published 🐳" >> $GITHUB_STEP_SUMMARY
                echo "Image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY

        # ===== JOB 3: DEPLOY TO KUBERNETES =====
  deploy-to-kubernetes:
    name: Deploy to Kubernetes
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # In a real production setup, you'd configure kubectl here
            # with your cluster's kubeconfig stored as a secret.
            # For Minikube (local), you deploy manually or use a self-hosted runner.
            # This step shows the production pattern:
            - name: Configure kubectl
              run: |
                echo "In production: use actions/configure-aws-credentials for EKS"
                echo "or set KUBECONFIG from a GitHub secret for GKE/AKS"
                echo "For this project: deploy manually using kubectl apply -f k8s/"

            # Update the image tag in Kubernetes deployment manifest
            # This is the GitOps pattern — the manifest in git reflects deployed state
            - name: Update image in deployment manifest
              run: |
                sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml
                echo "Updated deployment to use image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

            # For local Minikube: print the deploy command
            - name: Deploy instructions
              run: |
                echo "### Deployment Ready 🚀" >> $GITHUB_STEP_SUMMARY
                echo "Run locally: kubectl apply -f k8s/" >> $GITHUB_STEP_SUMMARY
                echo "Image tag: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
